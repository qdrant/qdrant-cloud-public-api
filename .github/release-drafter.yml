name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
version-resolver:
  default: minor
categories:
  - title: "🚀 Features"
    when:
      labels:
        - "feature"
        - "feat"
        - "enhancement"
  - title: "🐛 Bug Fixes"
    when:
      labels:
        - "fix"
        - "bugfix"
        - "bug"
  - title: "🧰 Maintenance"
    when:
      labels:
        - "chore"
        - "dependencies"
template: |
  # What's Changed

  $CHANGES
