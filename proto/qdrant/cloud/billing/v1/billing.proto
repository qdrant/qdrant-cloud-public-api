syntax = "proto3";

package qdrant.cloud.billing.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "qdrant/cloud/common/v1/common.proto";

// BillingService is the API used to retrieve billing information, such as invoices.
service BillingService {
  // The API version of this service.
  option (qdrant.cloud.common.v1.api_version) = {
    major: 1
    minor: 0
    patch: 0
  };
  // Lists all invoices for the account identified by the given ID.
  // Required permissions:
  // - read:payment_information
  rpc ListInvoices(ListInvoicesRequest) returns (ListInvoicesResponse) {
    // permissions
    option (common.v1.permissions) = "read:payment_information";
    // gRPC Gateway REST call
    option (google.api.http) = {get: "/api/billing/v1/accounts/{account_id}/invoices"};
  }
  // Lists all discounts for the account identified by the given ID.
  // Required permissions:
  // - read:payment_information
  rpc ListDiscounts(ListDiscountsRequest) returns (ListDiscountsResponse) {
    // permissions
    option (common.v1.permissions) = "read:payment_information";
    // gRPC Gateway REST call
    option (google.api.http) = {get: "/api/billing/v1/accounts/{account_id}/discounts"};
  }
  // Lists all prepaid credits for the organization identified by the given ID.
  // Required permissions:
  // - read:payment_information
  rpc ListPrepaidCredits(ListPrepaidCreditsRequest) returns (ListPrepaidCreditsResponse) {
    // permissions
    option (common.v1.permissions) = "read:payment_information";
    option (common.v1.account_id_expression) = "organization_id";
    // gRPC Gateway REST call
    option (google.api.http) = {get: "/api/billing/v1/organizations/{organization_id}/prepaid-credits"};
  }
}

// ListInvoicesRequest is the request for the ListInvoices function
message ListInvoicesRequest {
  // The identifier of the account (in GUID format).
  // This is a required field.
  string account_id = 1 [(buf.validate.field).string = {uuid: true}];
}

// ListInvoicesResponse is the response from the ListInvoices function
message ListInvoicesResponse {
  // The list of invoices.
  repeated Invoice items = 1;
}

// ListDiscountsRequest is the request for the ListDiscounts function
message ListDiscountsRequest {
  // The identifier of the account (in GUID format).
  // This is a required field.
  string account_id = 1 [(buf.validate.field).string = {uuid: true}];
}

// ListDiscountsResponse is the response from the ListDiscounts function
message ListDiscountsResponse {
  // The list of discounts.
  repeated Discount items = 1;
}

// buf:lint:ignore QDRANT_CLOUD_REQUIRED_ENTITY_FIELDS
// Invoice represents a billing invoice issued to an account.
message Invoice {
  // Unique identifier for the invoice.
  string id = 1 [(buf.validate.field).string.min_len = 1];
  // Optional invoice unique identifier. It appears on emails sent to the
  // customer for this invoice.
  optional string number = 2 [(buf.validate.field).string.min_len = 1];
  // Total invoice amount in millicents.
  int64 total_amount = 3 [(buf.validate.field).int64.gte = 0];
  // The timestamp when the invoice was created.
  google.protobuf.Timestamp created_at = 4 [(buf.validate.field).required = true];
  // The current status of the invoice.
  InvoiceStatus status = 5 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  // The URL to download the PDF for the invoice.
  // If the invoice has not been finalized yet, this field will not be set.
  optional string pdf_url = 6 [(buf.validate.field).string.uri = true];
}

// buf:lint:ignore QDRANT_CLOUD_REQUIRED_ENTITY_FIELDS
// Discount represents a billing discount applied to an account.
message Discount {
  option (buf.validate.message).cel = {
    id: "discount.valid_period"
    message: "valid_until must be after valid_from"
    expression: "this.valid_until > this.valid_from"
  };
  // Human-readable name for the discount.
  string name = 1 [(buf.validate.field).string.min_len = 1];
  // The type of discount.
  oneof type {
    option (buf.validate.oneof).required = true;
    // Percentage-based discount (e.g., 10% off).
    DiscountPercentage percentage = 2;
    // Fixed amount discount (e.g., $5 off).
    DiscountFixed fixed = 3;
  }
  // The timestamp when the discount becomes valid.
  google.protobuf.Timestamp valid_from = 4 [(buf.validate.field).required = true];
  // The timestamp when the discount expires. Must be after valid_from.
  google.protobuf.Timestamp valid_until = 5 [(buf.validate.field) = {
    required: true
    timestamp: {gt_now: false}
  }];
}

// DiscountPercentage represents a percentage-based discount.
message DiscountPercentage {
  // The percentage value (e.g., 12.5 for 12.5%). Must be between 0 and 100.
  double value = 1 [(buf.validate.field).double = {
    gte: 0.0
    lte: 100.0
  }];
}

// DiscountFixed represents a fixed amount discount.
message DiscountFixed {
  // The discount amount as a decimal. Must be positive.
  double value = 1 [(buf.validate.field).double.gt = 0.0];
  // The currency for the discount amount.
  // Specifies the currency in which the prices are denominated.
  // Must be a 3-letter ISO 4217 currency code (e.g., "USD").
  string currency = 2 [(buf.validate.field).string = {pattern: "^[A-Z]{3}$"}];
}

// buf:lint:ignore QDRANT_CLOUD_REQUIRED_REQUEST_FIELDS
// ListPrepaidCreditsRequest is the request for the ListPrepaidCredits function
message ListPrepaidCreditsRequest {
  // The identifier of the organization (in GUID format).
  // This is a required field.
  string organization_id = 1 [(buf.validate.field).string = {uuid: true}];
}

// ListPrepaidCreditsResponse is the response from the ListPrepaidCredits function
message ListPrepaidCreditsResponse {
  // The list of prepaid credits.
  repeated PrepaidCredit items = 1;
}

// buf:lint:ignore QDRANT_CLOUD_REQUIRED_ENTITY_FIELDS
// PrepaidCredit represents a prepaid credit contract for an organization.
message PrepaidCredit {
  // Unique identifier for the prepaid credit record.
  string id = 1 [(buf.validate.field).string = {uuid: true}];
  // The identifier of the organization this credit belongs to.
  string organization_id = 2 [(buf.validate.field).string = {uuid: true}];
  // Total contract value in USD.
  double total_amount_usd = 3 [(buf.validate.field).double.gt = 0.0];
  // How often the credit is invoiced.
  BillingFrequency billing_frequency = 4 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  // The timestamp when the contract becomes active.
  google.protobuf.Timestamp active_from = 5 [(buf.validate.field).required = true];
  // The timestamp when the contract expires.
  google.protobuf.Timestamp active_to = 6 [(buf.validate.field).required = true];
  // The derived status of the contract based on dates and cancellation.
  PrepaidCreditStatus status = 7 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  // The Orb credit block ID, populated once the block has been created in Orb.
  optional string orb_credit_block_id = 8 [(buf.validate.field).string.min_len = 1];
  // Optional internal notes about this contract.
  optional string notes = 9 [(buf.validate.field).string.min_len = 1];
}

// BillingFrequency represents the invoicing cadence for a prepaid credit contract.
enum BillingFrequency {
  // Unspecified
  BILLING_FREQUENCY_UNSPECIFIED = 0;
  // Monthly
  BILLING_FREQUENCY_MONTHLY = 1;
  // Quarterly
  BILLING_FREQUENCY_QUARTERLY = 2;
  // Semi-annual
  BILLING_FREQUENCY_SEMI_ANNUAL = 3;
  // Annual
  BILLING_FREQUENCY_ANNUAL = 4;
}

// PrepaidCreditStatus represents the derived status of a prepaid credit contract.
enum PrepaidCreditStatus {
  // Unspecified
  PREPAID_CREDIT_STATUS_UNSPECIFIED = 0;
  // The contract is not yet active (active_from is in the future).
  PREPAID_CREDIT_STATUS_UPCOMING = 1;
  // The contract is currently active.
  PREPAID_CREDIT_STATUS_ACTIVE = 2;
  // The contract has expired (active_to is in the past).
  PREPAID_CREDIT_STATUS_EXPIRED = 3;
  // The contract has been cancelled (deleted_at is set).
  PREPAID_CREDIT_STATUS_CANCELLED = 4;
}

// The possible status of an invoice.
enum InvoiceStatus {
  // Unspecified
  INVOICE_STATUS_UNSPECIFIED = 0;
  // Draft
  INVOICE_STATUS_DRAFT = 1;
  // Open
  INVOICE_STATUS_OPEN = 2;
  // Void
  INVOICE_STATUS_VOID = 3;
  // Paid
  INVOICE_STATUS_PAID = 4;
  // Uncollectible
  INVOICE_STATUS_UNCOLLECTIBLE = 5;
}
