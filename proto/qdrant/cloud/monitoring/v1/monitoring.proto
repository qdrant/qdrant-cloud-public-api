syntax = "proto3";

package qdrant.cloud.monitoring.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "qdrant/cloud/common/v1/common.proto";

// MonitoringService provides access to monitoring data such as cluster metrics, logs, and events.
service MonitoringService {
  // The API version of this service.
  option (qdrant.cloud.common.v1.api_version) = {
    major: 1
    minor: 0
    patch: 0
  };
  // Gets the summary metrics of a cluster in the account identified by the given ID.
  // Required permissions:
  // - read:clusters
  rpc GetClusterSummaryMetrics(GetClusterSummaryMetricsRequest) returns (GetClusterSummaryMetricsResponse) {
    // permissions
    option (common.v1.permissions) = "read:clusters";
    // gRPC Gateway REST call
    option (google.api.http) = {get: "/api/monitoring/v1/accounts/{account_id}/cluster/{cluster_id}/summary-metrics"};
    // log fields
    option (common.v1.log_fields) = {
      name: "cluster_id"
      field_expression: "cluster_id"
    };
  }
  // Gets the detailed usage metrics (as timeseries) of a cluster in the account identified by the given ID.
  // Required permissions:
  // - read:clusters
  rpc GetClusterUsageMetrics(GetClusterUsageMetricsRequest) returns (GetClusterUsageMetricsResponse) {
    // permissions
    option (common.v1.permissions) = "read:clusters";
    // gRPC Gateway REST call
    option (google.api.http) = {get: "/api/monitoring/v1/accounts/{account_id}/cluster/{cluster_id}/usage-metrics"};
    // log fields
    option (common.v1.log_fields) = {
      name: "cluster_id"
      field_expression: "cluster_id"
    };
  }
  // Gets the logs of a cluster in the account identified by the given ID.
  // Required permissions:
  // - read:clusters
  rpc GetClusterLogs(GetClusterLogsRequest) returns (GetClusterLogsResponse) {
    // permissions
    option (common.v1.permissions) = "read:clusters";
    // gRPC Gateway REST call
    option (google.api.http) = {get: "/api/monitoring/v1/accounts/{account_id}/cluster/{cluster_id}/logs"};
    // log fields
    option (common.v1.log_fields) = {
      name: "cluster_id"
      field_expression: "cluster_id"
    };
  }
  // Gets the events of a cluster in the account identified by the given ID.
  // This method is currently available only for clusters running in hybrid cloud environments.
  // Required permissions:
  // - read:clusters
  rpc GetClusterEvents(GetClusterEventsRequest) returns (GetClusterEventsResponse) {
    // permissions
    option (common.v1.permissions) = "read:clusters";
    // gRPC Gateway REST call
    option (google.api.http) = {get: "/api/monitoring/v1/accounts/{account_id}/cluster/{cluster_id}/events"};
    // log fields
    option (common.v1.log_fields) = {
      name: "cluster_id"
      field_expression: "cluster_id"
    };
  }
  // Gets the inference token usage metrics for a cluster.
  // Provide `inference_model_id` to limit the response to a single model.
  // Required permissions:
  // - read:clusters
  rpc GetClusterInferenceMetrics(GetClusterInferenceMetricsRequest) returns (GetClusterInferenceMetricsResponse) {
    // permissions
    option (common.v1.permissions) = "read:clusters";
    // gRPC Gateway REST call
    option (google.api.http) = {get: "/api/monitoring/v1/accounts/{account_id}/cluster/{cluster_id}/metrics/inference"};
    // log fields
    option (common.v1.log_fields) = {
      name: "cluster_id"
      field_expression: "cluster_id"
    };
  }
  // Lists the alerts for a cluster in the account identified by the given ID.
  // Sorted by last_firing_at (most recent first).
  // Required permissions:
  // - read:clusters
  rpc ListClusterAlerts(ListClusterAlertsRequest) returns (ListClusterAlertsResponse) {
    // permissions
    option (common.v1.permissions) = "read:clusters";
    // gRPC Gateway REST call
    option (google.api.http) = {get: "/api/monitoring/v1/accounts/{account_id}/cluster/{cluster_id}/alerts"};
    // log fields
    option (common.v1.log_fields) = {
      name: "cluster_id"
      field_expression: "cluster_id"
    };
  }
}

// GetClusterSummaryMetricsRequest is the request for the GetClusterSummaryMetrics function
message GetClusterSummaryMetricsRequest {
  // The identifier of the account (in GUID format).
  // This is a required field.
  string account_id = 1 [(buf.validate.field).string = {uuid: true}];
  // The identifier for the cluster (in GUID format).
  // This cluster should be part of the provided account.
  // This is a required field.
  string cluster_id = 2 [(buf.validate.field).string = {uuid: true}];
}

// GetClusterSummaryMetricsResponse is the response from the GetClusterSummaryMetrics function
message GetClusterSummaryMetricsResponse {
  // List of metrics aggregated per node in the cluster.
  repeated ClusterNodeMetrics nodes = 1;
}

// GetClusterUsageMetricsRequest is the request for the GetClusterUsageMetrics function
message GetClusterUsageMetricsRequest {
  // The identifier of the account (in GUID format).
  // This is a required field.
  string account_id = 1 [(buf.validate.field).string = {uuid: true}];
  // The identifier for the cluster (in GUID format).
  // This cluster should be part of the provided account.
  // This is a required field.
  string cluster_id = 2 [(buf.validate.field).string = {uuid: true}];
  // Optional start time for the metrics query.
  // If omitted, defaults to 1 hour ago.
  optional google.protobuf.Timestamp since = 3;
  // Optional end time for the metrics query.
  // If omitted, defaults to current time.
  optional google.protobuf.Timestamp until = 4;
  option (buf.validate.message).cel = {
    id: "get_cluster_usage_metrics.until_gt_since"
    message: "until must be after since"
    expression: "!has(this.since) || !has(this.until) || this.until > this.since"
  };
  // Aggregation function to apply to the time series data.
  // If omitted, defaults to SUM.
  optional Aggregator aggregator = 5 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

// GetClusterUsageMetricsResponse is the response from the GetClusterUsageMetrics function
message GetClusterUsageMetricsResponse {
  // Timeseries of overall CPU usage across the cluster.
  repeated Metric cpu = 1;
  // Timeseries of overall RAM usage across the cluster.
  repeated Metric ram = 2;
  // Timeseries of RAM used for cache across the cluster.
  repeated Metric ram_cache = 3;
  // Timeseries of RSS memory used across the cluster.
  repeated Metric ram_rss = 4;
  // Timeseries of RSS memory used by the Qdrant database across the cluster.
  repeated Metric ram_qdrant_rss = 5;
  // Timeseries of disk usage across the cluster.
  repeated Metric disk = 6;
  // Timeseries of requests per second (RPS) across the cluster.
  repeated Metric rps = 7;
  // Timeseries of request latency across the cluster.
  repeated Metric latency = 8;
  // Per-node metrics.
  repeated ClusterNodeUsageMetrics nodes = 9;
  // Timeseries of overall GPU usage across the cluster.
  repeated Metric gpu = 10;
  // Timeseries of overall GPU RAM usage across the cluster.
  repeated Metric gpu_ram = 11;
}

// GetClusterLogsRequest is the request for the GetClusterLogs function
message GetClusterLogsRequest {
  // The identifier of the account (in GUID format).
  // This is a required field.
  string account_id = 1 [(buf.validate.field).string = {uuid: true}];
  // The identifier for the cluster (in GUID format).
  // This cluster should be part of the provided account.
  // This is a required field.
  string cluster_id = 2 [(buf.validate.field).string = {uuid: true}];
  // Optional start time for the logs query.
  // If omitted, defaults to 3 days ago.
  optional google.protobuf.Timestamp since = 3;
  // Optional end time for the logs query.
  // If omitted, defaults to current time.
  optional google.protobuf.Timestamp until = 4;
  option (buf.validate.message).cel = {
    id: "get_cluster_logs.until_gt_since"
    message: "until must be after since"
    expression: "!has(this.since) || !has(this.until) || this.until > this.since"
  };
}

// GetClusterLogsResponse is the response from the GetClusterLogs function
message GetClusterLogsResponse {
  // A list of log entries from the cluster.
  repeated LogEntry items = 1;
}

// GetClusterEventsRequest is the request for the GetClusterEvents function
message GetClusterEventsRequest {
  // The identifier of the account (in GUID format).
  // This is a required field.
  string account_id = 1 [(buf.validate.field).string = {uuid: true}];
  // The identifier for the cluster (in GUID format).
  // This cluster should be part of the provided account.
  // This is a required field.
  string cluster_id = 2 [(buf.validate.field).string = {uuid: true}];
  // Optional start time for the events query.
  // If omitted, defaults to 7 days ago.
  optional google.protobuf.Timestamp since = 3;
  // Optional end time for the events query.
  // If omitted, defaults to current time.
  optional google.protobuf.Timestamp until = 4;
  option (buf.validate.message).cel = {
    id: "get_cluster_events.until_gt_since"
    message: "until must be after since"
    expression: "!has(this.since) || !has(this.until) || this.until > this.since"
  };
}

// GetClusterEventsRequest is the response from the GetClusterEvents function
message GetClusterEventsResponse {
  // A list of entries representing events that have happened in the cluster.
  repeated LogEntry items = 1;
}

// GetClusterInferenceMetricsRequest is the request for the GetClusterInferenceMetrics function
message GetClusterInferenceMetricsRequest {
  // The identifier of the account (in GUID format).
  // This is a required field.
  string account_id = 1 [(buf.validate.field).string = {uuid: true}];
  // The identifier for the cluster (in GUID format).
  // This cluster should be part of the provided account.
  // This is a required field.
  string cluster_id = 2 [(buf.validate.field).string = {uuid: true}];
  // Optional start time for the inference metrics query.
  // If omitted, defaults to 7 days ago.
  optional google.protobuf.Timestamp since = 3;
  // Optional end time for the inference metrics query.
  // If omitted, defaults to current time.
  optional google.protobuf.Timestamp until = 4;
  option (buf.validate.message).cel = {
    id: "get_cluster_inference_metrics.until_gt_since"
    message: "until must be after since"
    expression: "!has(this.since) || !has(this.until) || this.until > this.since"
  };
  // Optional aggregation interval for histogram buckets.
  optional InferenceMetricsInterval interval = 5 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  // Optional identifier for a specific inference model to filter metrics by.
  optional string inference_model_id = 6 [(buf.validate.field).string.min_len = 1];
}

// GetClusterInferenceMetricsResponse is the response from the GetClusterInferenceMetrics function
message GetClusterInferenceMetricsResponse {
  // Per-model inference token usage metrics for the cluster.
  repeated ClusterInferenceModelMetrics models = 1;
}

// ClusterInferenceModelMetrics groups histogram data for a single inference model.
message ClusterInferenceModelMetrics {
  // Identifier of the inference model.
  string inference_model_id = 1 [(buf.validate.field).string.min_len = 1];
  // Aggregated histogram values for the inference model.
  repeated Metric values = 2;
}

// ClusterNodeMetrics contains metric overview for a node.
message ClusterNodeMetrics {
  // Unique identifier of the node.
  string node_id = 1 [(buf.validate.field).string.min_len = 1];
  // Overview of CPU usage.
  ClusterMetricOverview cpu = 2 [(buf.validate.field).required = true];
  // Overview of RAM usage.
  ClusterMetricOverview ram = 3 [(buf.validate.field).required = true];
  // Overview of RAM cache usage.
  ClusterMetricOverview ram_cache = 4 [(buf.validate.field).required = true];
  // Overview of RSS memory usage.
  ClusterMetricOverview ram_rss = 5 [(buf.validate.field).required = true];
  // Overview of RSS memory usage by the Qdrant database.
  ClusterMetricOverview ram_qdrant_rss = 6 [(buf.validate.field).required = true];
  // Overview of disk usage.
  ClusterMetricOverview disk = 7 [(buf.validate.field).required = true];
  // optional Overview of GPU usage.
  optional ClusterMetricOverview gpu = 8 [(buf.validate.field).required = false];
  // Overview of GPU RAM usage.
  optional ClusterMetricOverview gpu_ram = 9 [(buf.validate.field).required = false];
}

// ClusterMetricOverview contains both the average values of a metric over
// predefined intervals, and the total available value of that resource.
message ClusterMetricOverview {
  // Average metric values calculated over various time intervals.
  repeated IntervalAverage avg = 1;
  // Total available value of the resource on the node.
  ResourceValue total = 2 [(buf.validate.field).required = true];
}

// IntervalAverage represents the average value of a metric over a specific time interval.
message IntervalAverage {
  // The duration of the interval.
  google.protobuf.Duration interval = 1 [(buf.validate.field).required = true];
  // Average value of the metric during the specified interval.
  double value = 2 [(buf.validate.field).double.gte = 0];
}

// ResourceValue represents the total value of a resource along with its unit.
message ResourceValue {
  // Value of the resource, e.g., 0.5.
  double value = 1 [(buf.validate.field).double.gte = 0];
  // Unit of the resource value, e.g., "vcpu/core".
  string unit = 2 [(buf.validate.field).string.min_len = 1];
}

// ClusterNodeUsageMetrics defines per-node usage metrics.
message ClusterNodeUsageMetrics {
  // Unique identifier of the node.
  string node_id = 1 [(buf.validate.field).string.min_len = 1];
  // Timeseries of CPU usage for the node.
  repeated Metric cpu = 2;
  // Timeseries of RAM usage for the node.
  repeated Metric ram = 3;
  // Timeseries of RAM cache usage for the node.
  repeated Metric ram_cache = 4;
  // Timeseries of RSS memory usage for the node.
  repeated Metric ram_rss = 5;
  // Timeseries of RSS memory usage by the Qdrant database for the node.
  repeated Metric ram_qdrant_rss = 6;
  // Timeseries of disk usage for the node.
  repeated Metric disk = 7;
  // Timeseries of gpu usage for the node.
  repeated Metric gpu = 8;
  // Timeseries of GPU RAM usage for the node.
  repeated Metric gpu_ram = 9;
}

// A single metric data point.
message Metric {
  // Timestamp of the data point.
  google.protobuf.Timestamp timestamp = 1 [(buf.validate.field).required = true];
  // Numerical value of the metric at the given timestamp.
  double value = 2 [(buf.validate.field).double.gte = 0];
}

// LogEntry represents a single log line.
message LogEntry {
  // The timestamp indicating when the log entry was recorded.
  google.protobuf.Timestamp timestamp = 1 [(buf.validate.field).required = true];
  // The content of the log message.
  string message = 2 [(buf.validate.field).string.min_len = 1];
}

// ListClusterAlertsRequest is the request for the ListClusterAlerts function
message ListClusterAlertsRequest {
  // The identifier of the account (in GUID format).
  // This is a required field.
  string account_id = 1 [(buf.validate.field).string = {uuid: true}];
  // The identifier for the cluster (in GUID format).
  // This cluster should be part of the provided account.
  // This is a required field.
  string cluster_id = 2 [(buf.validate.field).string = {uuid: true}];
  // Optional alert-state filter. If omitted (empty), alerts in ALL states are
  // returned; if set, only alerts in that state are returned.
  optional ClusterAlertState state = 3;
}

// ListClusterAlertsResponse is the response from the ListClusterAlerts function
message ListClusterAlertsResponse {
  // The alerts for the cluster, sorted by last_firing_at (descending) - most recent first.
  repeated ClusterAlert alerts = 1;
}

// buf:lint:ignore QDRANT_CLOUD_REQUIRED_ENTITY_FIELDS
// ClusterAlert is a single alert instance for a cluster.
message ClusterAlert {
  // Stable identifier for this firing instance (in GUID format).
  // Re-firing a previously-resolved alert produces a new ID.
  string id = 1;
  // The category of alert.
  ClusterAlertType type = 2;
  // Severity tier, derived server-side from the alert type.
  ClusterAlertSeverity severity = 3;
  // Human-readable title (English, at most 80 characters).
  string title = 4;
  // Human-readable description (English, at most 300 characters).
  string description = 5;
  // UTC timestamp of the most recent firing observation for this instance.
  google.protobuf.Timestamp last_firing_at = 6;
  // The state of this alert. Always populated so callers can tell each row's
  // state apart when the request applies no state filter.
  ClusterAlertState state = 7;
  // The name of the node this alert is attributed to (matches ClusterNodeInfo.name).
  // Absent for cluster-level alerts; at most one node per alert.
  optional string node_name = 8;
  // The raw infrastructure message behind this alert (at most 4096 characters).
  // Only populated for CLUSTER_ALERT_TYPE_NODE_* alerts.
  optional string raw_message = 9;
}

// Aggregator defines how metrics should be aggregated over time.
enum Aggregator {
  // Unspecified aggregation function.
  AGGREGATOR_UNSPECIFIED = 0;
  // SUM aggregation function.
  AGGREGATOR_SUM = 1;
  // AVG aggregation function.
  AGGREGATOR_AVG = 2;
  // MAX aggregation function.
  AGGREGATOR_MAX = 3;
  // MIN aggregation function.
  AGGREGATOR_MIN = 4;
}

// InferenceMetricsInterval defines the histogram bucket size for inference metrics.
enum InferenceMetricsInterval {
  // Interval is unspecified; defaults to DAY.
  INFERENCE_METRICS_INTERVAL_UNSPECIFIED = 0;
  // Buckets are aggregated per day.
  INFERENCE_METRICS_INTERVAL_DAY = 1;
  // Buckets are aggregated per week.
  INFERENCE_METRICS_INTERVAL_WEEK = 2;
  // Buckets are aggregated per month.
  INFERENCE_METRICS_INTERVAL_MONTH = 3;
}

// ClusterAlertState mirrors the backend state of a cluster alert. It is used both as
// the optional request-side filter AND echoed per row on the ClusterAlert response.
enum ClusterAlertState {
  // The alert state is unspecified.
  CLUSTER_ALERT_STATE_UNSPECIFIED = 0;
  // The alert is currently firing.
  CLUSTER_ALERT_STATE_FIRING = 1;
  // The alert has been resolved by the backend.
  CLUSTER_ALERT_STATE_RESOLVED = 2;
}

// ClusterAlertType is the category of a cluster alert. Mirrors the backend alert types.
enum ClusterAlertType {
  // The alert type is unspecified.
  CLUSTER_ALERT_TYPE_UNSPECIFIED = 0;
  // Disk usage is over the configured utilization threshold.
  CLUSTER_ALERT_TYPE_DISK_OVERUTILIZED = 1;
  // Memory usage is over the configured utilization threshold.
  CLUSTER_ALERT_TYPE_MEMORY_OVERUTILIZED = 2;
  // The cluster is out of disk.
  CLUSTER_ALERT_TYPE_OOD = 3;
  // The cluster is out of memory.
  CLUSTER_ALERT_TYPE_OOM = 4;
  // One or more nodes are in recovery mode.
  CLUSTER_ALERT_TYPE_RECOVERY_MODE = 5;
  // The Qdrant cluster is unhealthy.
  CLUSTER_ALERT_TYPE_QDRANT_CLUSTER_UNHEALTHY = 6;
  // The cluster has too many collections.
  CLUSTER_ALERT_TYPE_TOO_MANY_COLLECTIONS = 7;
  // The Qdrant cluster is being CPU throttled.
  CLUSTER_ALERT_TYPE_QDRANT_CLUSTER_CPU_THROTTLED = 8;
  // A Qdrant JWT API key is about to expire.
  CLUSTER_ALERT_TYPE_QDRANT_JWT_API_KEY_ABOUT_TO_EXPIRE = 9;
  // The cluster version is not covered by the SLA.
  CLUSTER_ALERT_TYPE_CLUSTER_VERSION_IS_NOT_COVERED_BY_SLA = 10;
  // The cluster has a disk hotspot.
  CLUSTER_ALERT_TYPE_CLUSTER_DISK_HOTSPOT = 11;
  // The cluster has a memory hotspot.
  CLUSTER_ALERT_TYPE_CLUSTER_MEMORY_HOTSPOT = 12;
  // The cluster has a CPU hotspot.
  CLUSTER_ALERT_TYPE_CLUSTER_CPU_HOTSPOT = 13;
  // A node cannot be scheduled due to insufficient CPU or memory (Hybrid Cloud).
  CLUSTER_ALERT_TYPE_NODE_INSUFFICIENT_RESOURCES = 14;
  // A node's storage volume cannot be provisioned, attached or mounted (Hybrid Cloud).
  CLUSTER_ALERT_TYPE_NODE_STORAGE_UNAVAILABLE = 15;
  // A node references a missing secret or credential (Hybrid Cloud).
  CLUSTER_ALERT_TYPE_NODE_MISSING_SECRET = 16;
  // A node cannot be scheduled due to selector/toleration/affinity config (Hybrid Cloud).
  CLUSTER_ALERT_TYPE_NODE_SCHEDULING_CONFIG_MISMATCH = 17;
  // A node's container image cannot be pulled (Hybrid Cloud).
  CLUSTER_ALERT_TYPE_NODE_IMAGE_PULL_FAILURE = 18;
  // A node scheduling failure with no more specific category; see raw_message (Hybrid Cloud).
  CLUSTER_ALERT_TYPE_NODE_SCHEDULING_FAILURE = 19;
}

// ClusterAlertSeverity is the tier used by the UI to render badge color and announce severity to
// assistive tech. Color alone never conveys severity - clients must render the label.
enum ClusterAlertSeverity {
  // Default / fallback tier. Also what an alert type that is not yet mapped resolves to;
  // there is intentionally no separate UNKNOWN value.
  CLUSTER_ALERT_SEVERITY_UNSPECIFIED = 0;
  // Informational severity.
  CLUSTER_ALERT_SEVERITY_INFO = 1;
  // Warning severity.
  CLUSTER_ALERT_SEVERITY_WARNING = 2;
  // Critical severity.
  CLUSTER_ALERT_SEVERITY_CRITICAL = 3;
}
