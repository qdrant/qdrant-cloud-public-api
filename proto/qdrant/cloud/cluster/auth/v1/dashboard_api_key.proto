syntax = "proto3";

package qdrant.cloud.cluster.auth.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "qdrant/cloud/common/v1/common.proto";

// DashboardApiKeyService is the API used to manage keys that give access to a cluster database.
service DashboardApiKeyService {
  // Creates a database api key in the account identified by the given ID.
  // Required permissions:
  // - read:clusters
  rpc CreateDashboardApiKey(CreateDashboardApiKeyRequest) returns (CreateDashboardApiKeyResponse) {
    // permissions
    option (common.v1.permissions) = "read:clusters";
    // custom account-id expression
    option (qdrant.cloud.common.v1.account_id_expression) = "account_id";
    // gRPC Gateway REST call
    option (google.api.http) = {
      post: "/api/cluster/auth/v1/accounts/{account_id}/dashboard-api-key"
      body: "*"
    };
  }
}

// CreateDashboardApiKeyRequest is the request for the CreateDashboardApiKey function.
message CreateDashboardApiKeyRequest {
  // The identifier of the account (in GUID format).
  // This is a required field.
  string account_id = 1 [(buf.validate.field).string = {uuid: true}];
  // The identifier for the cluster (in GUID format).
  // This cluster should be part of the provided account.
  // This is a required field.
  string cluster_id = 2 [(buf.validate.field).string = {uuid: true}];
}

// CreateDashboardApiKeyResponse is the response from the CreateDashboardApiKey function.
message CreateDashboardApiKeyResponse {
  // The encrypted cookie.
  EncryptedCookie encrypted_cookie = 1;
}

// buf:lint:ignore QDRANT_CLOUD_REQUIRED_ENTITY_FIELDS
// An EncryptedCookie represents the encrypted cookie to access one Qdrant database (cluster).
message EncryptedCookie {
  // Example: local:v1:string
  string encrypted_cookie = 1 [(buf.validate.field).string.pattern = "^(local|vault):v([1-9][0-9]{0,4}):.*$"];
}
