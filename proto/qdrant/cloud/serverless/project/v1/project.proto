syntax = "proto3";

package qdrant.cloud.serverless.project.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "qdrant/cloud/common/v1/common.proto";
import "qdrant/cloud/event/v1/events.proto";

// ProjectService provides operations for managing projects
service ProjectService {
  // The API version of this service.
  option (qdrant.cloud.common.v1.api_version) = {
    major: 1
    minor: 0
    patch: 0
  };
  // ListProjects returns all projects for the authenticated user
  // Required Permissions:
  // - read:serverless
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse) {
    // permissions
    option (qdrant.cloud.common.v1.permissions) = "read:serverless";
    // gRPC Gateway REST call
    option (google.api.http) = {get: "/api/serverless/v1/accounts/{account_id}/projects"};
  }
  // CreateProject creates a new project with the specified configuration
  // Required Permissions:
  // - write:serverless
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse) {
    // permissions
    option (qdrant.cloud.common.v1.permissions) = "write:serverless";
    // custom account-id expression
    option (qdrant.cloud.common.v1.account_id_expression) = "project.account_id";
    // gRPC Gateway REST call
    option (google.api.http) = {
      post: "/api/serverless/v1/accounts/{project.account_id}/projects"
      body: "*"
    };
    // events
    option (qdrant.cloud.event.v1.event_options) = {
      event_type: EVENT_TYPE_CREATED
      resource_type: "serverless-project"
      resource_id_field: "resp.project.id"
      resource_url_template: "/accounts/{req.project.account_id}/serverless-projects/{resp.project.id}"
    };
    // log fields
    option (common.v1.log_fields) = {
      name: "project_name"
      field_expression: "project.name"
    };
  }
  // Updates a project in the account identified by the given ID.
  // Required Permissions:
  // - write:serverless
  rpc UpdateProject(UpdateProjectRequest) returns (UpdateProjectResponse) {
    // permissions
    option (qdrant.cloud.common.v1.permissions) = "write:serverless";
    // gRPC Gateway REST call
    option (google.api.http) = {
      put: "/api/serverless/v1/accounts/{project.account_id}/projects/{project.id}"
      body: "*"
    };
    // events
    option (qdrant.cloud.event.v1.event_options) = {
      event_type: EVENT_TYPE_UPDATED
      resource_type: "serverless-project"
      resource_id_field: "req.project.id"
      resource_url_template: "/accounts/{req.project.account_id}/serverless-projects/{req.project.id}"
    };
    // log fields
    option (common.v1.log_fields) = {
      name: "project_id"
      field_expression: "project.id"
    };
  }
  // DeleteProject removes a project by ID
  // Required Permissions:
  // - delete:serverless
  rpc DeleteProject(DeleteProjectRequest) returns (DeleteProjectResponse) {
    // permissions
    option (qdrant.cloud.common.v1.permissions) = "delete:serverless";
    // gRPC Gateway REST call
    option (google.api.http) = {delete: "/api/serverless/v1/accounts/{account_id}/projects/{project_id}"};
    // events
    option (qdrant.cloud.event.v1.event_options) = {
      event_type: EVENT_TYPE_DELETED
      resource_type: "serverless-project"
      resource_id_field: "req.project_id"
      resource_url_template: "/accounts/{req.account_id}/serverless-projects/{req.project_id}"
    };
    // log fields
    option (common.v1.log_fields) = {
      name: "project_id"
      field_expression: "project_id"
    };
  }
}

// ListProjectsRequest is an empty request to list projects
message ListProjectsRequest {
  // The identifier of the account (in GUID format).
  // This is a required field.
  string account_id = 1 [(buf.validate.field).string = {uuid: true}];
}

// ListProjectsResponse contains the list of projects
message ListProjectsResponse {
  // List of projects with their details
  repeated Project items = 1;
}

// CreateProjectRequest defines parameters for creating a new project
message CreateProjectRequest {
  // Project represents a vector search project in the Qdrant serverless environment
  Project project = 1 [(buf.validate.field).required = true];
  option (buf.validate.message).cel = {
    id: "create_project.no_read_only_fields"
    message: "read-only fields (id, created_at, deleted_at, state) must not be set on create"
    expression: "this.project.id == '' && !has(this.project.created_at) && !has(this.project.deleted_at) && !has(this.project.state)"
  };
}

// CreateProjectResponse provides details about a created project
message CreateProjectResponse {
  // Project represents a vector search project in the Qdrant serverless environment
  Project project = 1 [(buf.validate.field).required = true];
}

// UpdateProjectRequest is the request for the UpdateProject function
message UpdateProjectRequest {
  // The actual project
  // This is a required field.
  Project project = 1 [(buf.validate.field).required = true];
  option (buf.validate.message).cel = {
    id: "update_project.id_present"
    message: "project.id is required for an update"
    expression: "this.project.id != ''"
  };
}

// UpdateProjectResponse is the response from the UpdateProject function
message UpdateProjectResponse {
  // The actual project
  Project project = 1 [(buf.validate.field).required = true];
  option (buf.validate.message).cel = {
    id: "update_project.state_present"
    message: "state is required for an existing project"
    expression: "has(this.project.state)"
  };
}

// DeleteProjectRequest identifies the project to delete
message DeleteProjectRequest {
  // The identifier of the account (in GUID format).
  // This is a required field.
  string account_id = 1 [(buf.validate.field).string = {uuid: true}];
  // ID of the project to delete (in GUID format).
  // This is a required field.
  string project_id = 2 [(buf.validate.field).string = {uuid: true}];
}

// DeleteProjectResponse is an empty response for deletion confirmation
message DeleteProjectResponse {
  // Empty
}

// Project represents a vector search project in the Qdrant serverless environment
message Project {
  // Unique identifier for the project (in GUID format).
  // This is a read-only field and will be available after a project is created.
  string id = 1;
  option (buf.validate.message).cel = {
    id: "project.id"
    message: "value must be a valid UUID"
    expression: "this.id.matches(\'^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$\') || !has(this.created_at)"
  };
  // Timestamp when the project was created.
  // This is a read-only field and will be available after a project is created.
  google.protobuf.Timestamp created_at = 2;
  // Identifier of the account associated with the project (in GUID format).
  // This is a required field.
  string account_id = 3 [(buf.validate.field).string = {uuid: true}];
  // Name of the project.
  // This is a required field.
  // Name can only contain letters, numbers, underscores and dashes
  string name = 4 [(buf.validate.field).string = {
    max_len: 64
    min_len: 4
    pattern: "^[a-zA-Z0-9-_]+$"
  }];
  // Timestamp when the project was deleted (or is started to be deleting).
  // This is a read-only field and will be set after DeleteProject is called.
  google.protobuf.Timestamp deleted_at = 5;
  // Cloud provider where the project is hosted.
  // Must match one of the provider IDs returned by the `qdrant.cloud.platform.v1.PlatformService.ListCloudProviders` method.
  // In this case, `hybrid` isn't supported.
  // After creation, this field cannot be changed.
  string cloud_provider_id = 10 [(buf.validate.field).string = {min_len: 3}];
  // Cloud provider region where the project is hosted.
  // Must match one of the region IDs returned by the `qdrant.cloud.platform.v1.PlatformService.ListCloudProviderRegions` method.
  // After creation, this field cannot be changed.
  string cloud_provider_region_id = 11 [(buf.validate.field).string.min_len = 1];
  // Status of the project
  // All fields inside `state` are read-only.
  ProjectState state = 100;
}

// ProjectStatePhase defines the operational phases of a Qdrant project.
enum ProjectStatePhase {
  // Unspecified phase.
  PROJECT_STATE_PHASE_UNSPECIFIED = 0;
  // The Project is fully operational and available for use.
  PROJECT_STATE_PHASE_READY = 1;
  // The Project is being created, updated, or undergoing maintenance.
  PROJECT_STATE_PHASE_PROCESSING = 2;
  // The Project has been temporarily or permanently disabled.
  PROJECT_STATE_PHASE_DISABLED = 3;
}

// ProjectState represents the operational state of a project in the Qdrant serverless environment.
// It provides status information, error details (if any), and endpoint access information.
message ProjectState {
  // The current operational status of the project.
  ProjectStatePhase phase = 1 [(buf.validate.field).enum.defined_only = true];
  // Descriptive message explaining any errors or issues with the project.
  // Empty when the project is operating normally.
  string reason = 2;
  // The URL endpoint where clients can connect to and interact with the project.
  // Not set if the project is not yet ready or is disabled.
  optional ProjectEndpoint endpoint = 7;
}

// Endpoint information to access the qdrant project (aka serverless database).
// All fields in this message are a read-only field.
message ProjectEndpoint {
  // URL to access the qdrant project (aka serverless database) without port
  string url = 1 [(buf.validate.field).string = {uri: true}];
  // The port to use for HTTP REST calls (6333)
  int32 rest_port = 2 [(buf.validate.field).int32.gt = 0];
  // The port to use for gRPC calls (6334)
  int32 grpc_port = 3 [(buf.validate.field).int32.gt = 0];
}
