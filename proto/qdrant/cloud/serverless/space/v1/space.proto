syntax = "proto3";

package qdrant.cloud.serverless.space.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "qdrant/cloud/common/v1/common.proto";
import "qdrant/cloud/event/v1/events.proto";

// SpaceService provides operations for managing spaces.
service SpaceService {
  // The API version of this service.
  option (qdrant.cloud.common.v1.api_version) = {
    major: 1
    minor: 1
    patch: 0
  };
  // ListSpaces returns all spaces for the authenticated user
  // Required Permissions:
  // - read:serverless_spaces
  rpc ListSpaces(ListSpacesRequest) returns (ListSpacesResponse) {
    // permissions
    option (qdrant.cloud.common.v1.permissions) = "read:serverless_spaces";
    // gRPC Gateway REST call
    option (google.api.http) = {get: "/api/serverless/v1/accounts/{account_id}/spaces"};
  }
  // Gets a space in the account identified by the given ID.
  // Required permissions:
  // - read:serverless_spaces
  rpc GetSpace(GetSpaceRequest) returns (GetSpaceResponse) {
    // permissions
    option (common.v1.permissions) = "read:serverless_spaces";
    // gRPC Gateway REST call
    option (google.api.http) = {get: "/api/serverless/v1/accounts/{account_id}/spaces/{space_id}"};
    // log fields
    option (common.v1.log_fields) = {
      name: "space_id"
      field_expression: "space_id"
    };
  }
  // CreateSpace creates a new space with the specified configuration
  // Required Permissions:
  // - write:serverless_spaces
  rpc CreateSpace(CreateSpaceRequest) returns (CreateSpaceResponse) {
    // permissions
    option (qdrant.cloud.common.v1.permissions) = "write:serverless_spaces";
    // custom account-id expression
    option (qdrant.cloud.common.v1.account_id_expression) = "space.account_id";
    // gRPC Gateway REST call
    option (google.api.http) = {
      post: "/api/serverless/v1/accounts/{space.account_id}/spaces"
      body: "*"
    };
    // events
    option (qdrant.cloud.event.v1.event_options) = {
      event_type: EVENT_TYPE_CREATED
      resource_type: "serverless-space"
      resource_id_field: "resp.space.id"
      resource_url_template: "/accounts/{req.space.account_id}/serverless-spaces/{resp.space.id}"
    };
    // log fields
    option (common.v1.log_fields) = {
      name: "space_name"
      field_expression: "space.name"
    };
  }
  // Create a new space from an existing backup
  // Required permissions (both):
  // - restore:serverless_backups
  // - write:serverless_spaces
  rpc CreateSpaceFromBackup(CreateSpaceFromBackupRequest) returns (CreateSpaceFromBackupResponse) {
    // permissions
    option (common.v1.requires_all_permissions) = true;
    option (common.v1.permissions) = "restore:serverless_backups";
    option (common.v1.permissions) = "write:serverless_spaces";
    // gRPC Gateway REST call
    option (google.api.http) = {
      post: "/api/serverless/v1/accounts/{account_id}/backups/{backup_id}/spaces"
      body: "*"
    };
    // events
    option (qdrant.cloud.event.v1.event_options) = {
      event_type: EVENT_TYPE_CREATED
      resource_type: "serverless-space"
      resource_id_field: "resp.space.id"
      resource_url_template: "/accounts/{req.account_id}/serverless-spaces/{resp.space.id}"
      additional_context_fields: {
        key: "from_backup_id"
        value: "req.backup_id"
      }
    };
    // log fields
    option (common.v1.log_fields) = {
      name: "backup_id"
      field_expression: "backup_id"
    };
    option (common.v1.log_fields) = {
      name: "space_name"
      field_expression: "space_name"
    };
  }
  // Updates a space in the account identified by the given ID.
  // Required Permissions:
  // - write:serverless_spaces
  rpc UpdateSpace(UpdateSpaceRequest) returns (UpdateSpaceResponse) {
    // permissions
    option (qdrant.cloud.common.v1.permissions) = "write:serverless_spaces";
    // custom account-id expression
    option (qdrant.cloud.common.v1.account_id_expression) = "space.account_id";
    // gRPC Gateway REST call
    option (google.api.http) = {
      put: "/api/serverless/v1/accounts/{space.account_id}/spaces/{space.id}"
      body: "*"
    };
    // events
    option (qdrant.cloud.event.v1.event_options) = {
      event_type: EVENT_TYPE_UPDATED
      resource_type: "serverless-space"
      resource_id_field: "req.space.id"
      resource_url_template: "/accounts/{req.space.account_id}/serverless-spaces/{req.space.id}"
    };
    // log fields
    option (common.v1.log_fields) = {
      name: "space_id"
      field_expression: "space.id"
    };
  }
  // DeleteSpace removes a space by ID
  // Required Permissions:
  // - delete:serverless_spaces
  rpc DeleteSpace(DeleteSpaceRequest) returns (DeleteSpaceResponse) {
    // permissions
    option (qdrant.cloud.common.v1.permissions) = "delete:serverless_spaces";
    // gRPC Gateway REST call
    option (google.api.http) = {delete: "/api/serverless/v1/accounts/{account_id}/spaces/{space_id}"};
    // events
    option (qdrant.cloud.event.v1.event_options) = {
      event_type: EVENT_TYPE_DELETED
      resource_type: "serverless-space"
      resource_id_field: "req.space_id"
      resource_url_template: "/accounts/{req.account_id}/serverless-spaces/{req.space_id}"
    };
    // log fields
    option (common.v1.log_fields) = {
      name: "space_id"
      field_expression: "space_id"
    };
  }
  // Suggests a unique and human-friendly name for a new space in the specified account.
  // This can be used by clients to pre-fill the name field when creating a new space.
  // Required permissions:
  // - None (authenticated only)
  rpc SuggestSpaceName(SuggestSpaceNameRequest) returns (SuggestSpaceNameResponse) {
    // permissions
    option (common.v1.permissions) = "";
    // gRPC Gateway REST call
    option (google.api.http) = {get: "/api/serverless/v1/accounts/{account_id}/spaces/suggest-name"};
  }
}

// ListSpacesRequest is an empty request to list spaces
message ListSpacesRequest {
  // The identifier of the account (in GUID format).
  // This is a required field.
  string account_id = 1 [(buf.validate.field).string = {uuid: true}];
  // Cloud provider where the space is hosted.
  // Must match one of the provider IDs returned by the `qdrant.cloud.platform.v1.PlatformService.ListCloudProviders` method, which supports serverless regions.
  // In this case, `hybrid` isn't supported.
  optional string cloud_provider_id = 10 [(buf.validate.field).string = {min_len: 3}];
  option (buf.validate.message).cel = {
    id: "list_spaces.cloud_provider_id_present"
    message: "cloud_provider_id is required when cloud_provider_region_id is set"
    expression: "!has(this.cloud_provider_region_id) || has(this.cloud_provider_id)"
  };
  // Cloud provider region where the space is hosted.
  // Must match one of the region IDs returned by the `qdrant.cloud.platform.v1.PlatformService.ListCloudProviderRegions` method, which supports serverless.
  optional string cloud_provider_region_id = 11 [(buf.validate.field).string.min_len = 1];
  // Maximum number of items to return.
  // If not specified, all items are returned.
  optional int32 page_size = 20 [(buf.validate.field).int32 = {
    gt: 0
    lte: 250
  }];
  // A page token, received from a previous call.
  // Provide this to retrieve the subsequent page.
  // When paginating, all other parameters provided to the request must match
  // the call that provided the page token.
  optional string page_token = 21 [(buf.validate.field).string.min_len = 1];
}

// ListSpacesResponse contains the list of spaces
message ListSpacesResponse {
  // List of spaces with their details
  repeated Space items = 1;
  // The total number of items available (useful in relation with pagination).
  // This field is fill out when pagination is used (aka in the request `page_size` was provided).
  optional int32 total_size = 10 [(buf.validate.field).int32.gte = 0];
  // A token that can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  optional string next_page_token = 11 [(buf.validate.field).string.min_len = 1];
}

// GetSpaceRequest is the request for the GetSpace function
message GetSpaceRequest {
  // The identifier of the account (in GUID format).
  // This is a required field.
  string account_id = 1 [(buf.validate.field).string = {uuid: true}];
  // The identifier for the space (in GUID format).
  // This space should be part of the provided account.
  // This is a required field.
  string space_id = 2 [(buf.validate.field).string = {uuid: true}];
}

// GetSpaceResponse is the response from the GetSpace function
message GetSpaceResponse {
  // The actual space
  Space space = 1 [(buf.validate.field).required = true];
}

// CreateSpaceRequest defines parameters for creating a new space
message CreateSpaceRequest {
  // Space represents a space in the Qdrant serverless environment
  Space space = 1 [(buf.validate.field).required = true];
  option (buf.validate.message).cel = {
    id: "create_space.no_read_only_fields"
    message: "read-only fields (id, created_at, deleted_at, state) must not be set on create"
    expression: "this.space.id == '' && !has(this.space.created_at) && !has(this.space.deleted_at) && !has(this.space.state)"
  };
}

// CreateSpaceResponse provides details about a created space
message CreateSpaceResponse {
  // Space represents a space in the Qdrant serverless environment
  Space space = 1 [(buf.validate.field).required = true];
  option (buf.validate.message).cel = {
    id: "create_space.state_present"
    message: "state is required for an existing space"
    expression: "has(this.space.state)"
  };
}

// CreateSpaceFromBackupRequest is the request for the CreateSpaceFromBackup function.
message CreateSpaceFromBackupRequest {
  // The identifier of the account (in GUID format).
  // This is a required field.
  string account_id = 1 [(buf.validate.field).string = {uuid: true}];
  // The identifier of the backup (in GUID format).
  // This is a required field.
  string backup_id = 2 [(buf.validate.field).string = {uuid: true}];
  // Name of the new space
  string space_name = 3 [(buf.validate.field).string = {
    max_len: 64
    min_len: 4
    pattern: "^[a-zA-Z0-9-_]+$"
  }];
}

// CreateSpaceFromBackupResponse is the response for the CreateSpaceFromBackup function.
message CreateSpaceFromBackupResponse {
  // Space created from the backup
  Space space = 1 [(buf.validate.field).required = true];
  option (buf.validate.message).cel = {
    id: "create_space.state_present"
    message: "state is required for an existing space"
    expression: "has(this.space.state)"
  };
}

// UpdateSpaceRequest is the request for the UpdateSpace function
message UpdateSpaceRequest {
  // The actual space
  // This is a required field.
  Space space = 1 [(buf.validate.field).required = true];
  option (buf.validate.message).cel = {
    id: "update_space.id_present"
    message: "space.id is required for an update"
    expression: "this.space.id != ''"
  };
}

// UpdateSpaceResponse is the response from the UpdateSpace function
message UpdateSpaceResponse {
  // The actual space
  Space space = 1 [(buf.validate.field).required = true];
  option (buf.validate.message).cel = {
    id: "update_space.state_present"
    message: "state is required for an existing space"
    expression: "has(this.space.state)"
  };
}

// DeleteSpaceRequest identifies the space to delete
message DeleteSpaceRequest {
  // The identifier of the account (in GUID format).
  // This is a required field.
  string account_id = 1 [(buf.validate.field).string = {uuid: true}];
  // ID of the space to delete (in GUID format).
  // This is a required field.
  string space_id = 2 [(buf.validate.field).string = {uuid: true}];
  // If set, the backups of this space will be deleted as well.
  optional bool delete_backups = 3;
}

// DeleteSpaceResponse is an empty response for deletion confirmation
message DeleteSpaceResponse {
  // Empty
}

// SuggestSpaceNameRequest is the request for the SuggestSpaceName function
message SuggestSpaceNameRequest {
  // The identifier of the account (in GUID format).
  // This is a required field.
  string account_id = 1 [(buf.validate.field).string = {uuid: true}];
}

// SuggestSpaceNameResponse is the response from the SuggestSpaceName function
message SuggestSpaceNameResponse {
  // The suggested name for a new space.
  string name = 1 [(buf.validate.field).string.min_len = 1];
}

// Space represents a space in the Qdrant serverless environment.
// It can be used to store collections which can hold points.
message Space {
  // Unique identifier for the space (in GUID format).
  // This is a read-only field and will be available after a space is created.
  string id = 1;
  option (buf.validate.message).cel = {
    id: "space.id"
    message: "value must be a valid UUID"
    expression: "this.id.matches(\'^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$\') || !has(this.created_at)"
  };
  // Timestamp when the space was created.
  // This is a read-only field and will be available after a space is created.
  google.protobuf.Timestamp created_at = 2;
  // Identifier of the account associated with the space (in GUID format).
  // This is a required field.
  string account_id = 3 [(buf.validate.field).string = {uuid: true}];
  // Name of the space.
  // This is a required field and should be unique within the account.
  // Name can only contain letters, numbers, underscores and dashes
  string name = 4 [(buf.validate.field).string = {
    max_len: 64
    min_len: 4
    pattern: "^[a-zA-Z0-9-_]+$"
  }];
  // Timestamp when the space was deleted (or is started to be deleting).
  // This is a read-only field and will be set after DeleteSpace is called.
  google.protobuf.Timestamp deleted_at = 5;
  // Cloud provider where the space is hosted.
  // Must match one of the provider IDs returned by the `qdrant.cloud.platform.v1.PlatformService.ListCloudProviders` method, which supports serverless regions.
  // In this case, `hybrid` isn't supported.
  // After creation, this field cannot be changed.
  string cloud_provider_id = 10 [(buf.validate.field).string = {min_len: 3}];
  // Cloud provider region where the space is hosted.
  // Must match one of the region IDs returned by the `qdrant.cloud.platform.v1.PlatformService.ListCloudProviderRegions` method, which supports serverless.
  // After creation, this field cannot be changed.
  string cloud_provider_region_id = 11 [(buf.validate.field).string.min_len = 1];
  // List of labels for a space. These labels are used in the cloud ui and billing reports.
  // This is an optional field
  repeated common.v1.KeyValue labels = 12 [(buf.validate.field).repeated = {max_items: 10}];
  // When using cloud provider marketplaces for billing, the space label with the configured key is sent while metering
  // usage data as additional meta data to be used for cost allocation in the billing reports.
  optional string cost_allocation_label = 13 [(buf.validate.field).string = {
    max_len: 253
    pattern: "^([a-z0-9A-Z]([-a-z0-9A-Z]*[a-z0-9A-Z])?(\\.[a-z0-9A-Z]([-a-z0-9A-Z]*[a-z0-9A-Z])?)*\\/)?([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9]$"
  }];
  // Current configuration details of the space.
  // This is a required field.
  SpaceConfiguration configuration = 20 [(buf.validate.field).required = true];
  // The caller who created the space.
  // This is a read-only field and will be available after a space is created.
  common.v1.Caller created_by = 14;
  // The caller who last updated the space.
  // This is a read-only field and will be set after UpdateSpace is called.
  common.v1.Caller last_updated_by = 15;
  // The caller who initiated deletion of the space.
  // This is a read-only field and will be set when deleted_at is set.
  common.v1.Caller deleted_by = 16;
  // Status of the space
  // All fields inside `state` are read-only.
  SpaceState state = 100;
}

// A SpaceConfiguration represents the configuration of a space in the Qdrant serverless environment.
message SpaceConfiguration {
  // Timestamp when the space configuration was last updated.
  // This is a read-only field and will be available after a space is created.
  google.protobuf.Timestamp last_modified_at = 1;
  // List of allowed IP source ranges for this space.
  // This is an optional field.
  // The CIDRs supports IPv4 only.
  repeated string allowed_ip_source_ranges = 11 [(buf.validate.field).repeated = {
    max_items: 40
    items: {string: {ipv4_prefix: true}}
  }];
}

// SpaceStatePhase defines the operational phases of a Qdrant serverless space.
enum SpaceStatePhase {
  // Unspecified phase.
  SPACE_STATE_PHASE_UNSPECIFIED = 0;
  // The Space is being created, updated, or undergoing maintenance.
  SPACE_STATE_PHASE_PROCESSING = 1;
  // The Space is fully operational and available for use.
  SPACE_STATE_PHASE_READY = 2;
  // The Space has been temporarily or permanently disabled.
  SPACE_STATE_PHASE_DISABLED = 3;
  // The Space is being deleted.
  SPACE_STATE_PHASE_DELETING = 4;
}

// SpaceState represents the operational state of a space in the Qdrant serverless environment.
// It provides status information, error details (if any), and endpoint access information.
message SpaceState {
  // The current operational status of the space.
  SpaceStatePhase phase = 1 [(buf.validate.field).enum.defined_only = true];
  // Descriptive message explaining any errors or issues with the space.
  // Empty when the space is operating normally.
  string reason = 2;
  // The URL endpoint where clients can connect to and interact with the space.
  // Not set if the space is not yet ready or is disabled.
  optional SpaceEndpoint endpoint = 7;
}

// Endpoint information to access the qdrant space (aka serverless database).
// All fields in this message are a read-only field.
message SpaceEndpoint {
  // URL to access the qdrant space (aka serverless database) without port
  string url = 1 [(buf.validate.field).string = {uri: true}];
  // The port to use for HTTP REST calls (6333)
  int32 rest_port = 2 [(buf.validate.field).int32.gt = 0];
  // The port to use for gRPC calls (6334)
  int32 grpc_port = 3 [(buf.validate.field).int32.gt = 0];
}
